name: Publish to prefix.dev

# Builds the conda package (pixi-build, noarch python) and publishes it to
# https://prefix.dev/microdrop-plugins on every push to main that touches
# shipped files. Versioning is automatic: next version = latest v* tag with
# the patch bumped; run the workflow manually with an explicit version for
# minor/major releases. After a successful publish the stamped version is
# committed back ([skip ci]) and tagged, so the repo always reflects the
# channel.
#
# Auth: set the PREFIX_API_KEY repository secret (prefix.dev API key).
# Alternative (no stored secret): configure trusted publishing for this repo
# on the prefix.dev channel settings — id-token: write is already granted.

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "demos/**"
      - ".github/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit version (X.Y.Z); empty = patch-bump latest v* tag"
        required: false
        default: ""

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push the release commit + tag
      id-token: write   # for prefix.dev trusted publishing, if enabled later
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history: version is computed from v* tags

      - uses: prefix-dev/setup-pixi@v0.8.0
        with:
          pixi-version: v0.71.2
          run-install: false

      - name: Compute version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            NEW="${{ github.event.inputs.version }}"
          else
            LAST=$(git tag --list 'v*' --sort=-v:refname | head -n1)
            LAST=${LAST#v}
            LAST=${LAST:-1.0.0}
            IFS=. read -r MA MI PA <<< "$LAST"
            NEW="$MA.$MI.$((PA+1))"
          fi
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Publishing version $NEW"

      - name: Stamp version into pyproject.toml + microdrop_plugin.toml
        # Matches only bare X.Y.Z version lines: [project] and
        # [tool.pixi.package] in pyproject.toml plus the manifest version.
        # The build-backend's version = "0.*" line does not match.
        run: |
          V="${{ steps.ver.outputs.version }}"
          sed -i -E "s/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"\$/version = \"$V\"/" \
            pyproject.toml microdrop_plugin.toml
          grep -n '^version' pyproject.toml microdrop_plugin.toml

      - name: Authenticate with prefix.dev
        # pixi publish reads credentials from the auth store (not the
        # PREFIX_API_KEY env var, which only `pixi upload prefix` honors).
        env:
          PREFIX_API_KEY: ${{ secrets.PREFIX_API_KEY }}
        run: pixi auth login --token "$PREFIX_API_KEY" https://prefix.dev

      - name: Build + publish
        run: pixi publish --target-channel https://prefix.dev/microdrop-plugins

      - name: Commit release + tag
        # Only after a successful publish, so the repo never claims a version
        # the channel doesn't have. [skip ci] prevents a publish loop.
        run: |
          V="${{ steps.ver.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: release v$V [skip ci]"
          git tag "v$V"
          git push origin "HEAD:${GITHUB_REF_NAME:-main}" --tags
